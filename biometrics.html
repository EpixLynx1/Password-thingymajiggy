<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometric Keystroke Authentication</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 360px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #333; font-size: 24px; }
        p { color: #666; font-size: 14px; line-height: 1.5; }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            border-color: #007bff;
            outline: none;
        }
        .instructions-hint {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }
        .status-msg {
            font-weight: 600;
            margin-top: 15px;
            min-height: 20px;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .hidden { display: none; }
        
        /* Fixed corner Reset Button */
        .reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .reset-btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>

<button class="reset-btn" onclick="resetProgram()">Reset Program</button>

<div class="card">
    <div id="enroll-section">
        <h2>Phase 1: Enrollment</h2>
        <p id="enroll-instructions">Create your password. You will need to type it 3 times to train the biometric system.</p>
        <input type="password" id="enroll-input" placeholder="Type password..." autocomplete="off">
        <div class="instructions-hint">Press <strong>Enter</strong> to submit each attempt</div>
        <p id="enroll-status" class="status-msg error"></p>
    </div>

    <div id="verify-section" class="hidden">
        <h2>Phase 2: Biometric Login</h2>
        <p>Type your password. The system will verify your unique typing cadence and reaction patterns.</p>
        <input type="password" id="verify-input" placeholder="Verify password..." autocomplete="off">
        <div class="instructions-hint">Press <strong>Enter</strong> to log in</div>
        <p id="verify-status" class="status-msg"></p>
    </div>
</div>

<script>
    const REQUIRED_ENROLLMENTS = 3;
    // Permissible variance threshold (0.40 means biometric metrics can vary up to 40% from the mean)
    const BIOMETRIC_THRESHOLD = 0.40; 

    let enrolledPassword = "";
    let enrollmentProfiles = []; // Array to hold { reactionTime, typingDuration }
    let averageBiometrics = { reactionTime: 0, typingDuration: 0 };

    // Timing tracking states
    let focusTime = 0;
    let startTime = 0;
    let isTyping = false;

    // DOM Elements
    const enrollSection = document.getElementById('enroll-section');
    const verifySection = document.getElementById('verify-section');
    const enrollInput = document.getElementById('enroll-input');
    const verifyInput = document.getElementById('verify-input');
    const enrollInstructions = document.getElementById('enroll-instructions');
    const enrollStatus = document.getElementById('enroll-status');
    const verifyStatus = document.getElementById('verify-status');

    // Setup performance telemetry tracking on inputs
    function attachBiometricTracker(inputElement, onSubmitCallback) {
        inputElement.addEventListener('focus', () => {
            if (!isTyping) {
                focusTime = performance.now();
            }
        });

        inputElement.addEventListener('keydown', (e) => {
            // Mark the exact millisecond typing starts (Reaction Time finishes)
            if (!isTyping && e.key !== 'Enter') {
                startTime = performance.now();
                isTyping = true;
            }

            // Capture submission data on Enter key
            if (e.key === 'Enter') {
                e.preventDefault();
                const endTime = performance.now();
                
                const typingDuration = isTyping ? (endTime - startTime) : 0;
                const reactionTime = startTime - focusTime;

                // Reset state variables for next evaluation
                isTyping = false;
                const typedValue = inputElement.value;
                inputElement.value = "";
                focusTime = performance.now(); // reset anchor time for subsequent attempts

                onSubmitCallback(typedValue, reactionTime, typingDuration);
            }
        });
    }

    // Handle Enrollment Inputs
    attachBiometricTracker(enrollInput, (password, reactionTime, typingDuration) => {
        if (!password) return;

        // Establish the baseline text string on the first attempt
        if (enrollmentProfiles.length === 0) {
            enrolledPassword = password;
        } else if (password !== enrolledPassword) {
            enrollStatus.textContent = "Error: Password string mismatch. Use the exact same password text.";
            return;
        }
        enrollStatus.textContent = "";

        // Record the telemetry metrics
        enrollmentProfiles.push({ reactionTime, typingDuration });

        if (enrollmentProfiles.length < REQUIRED_ENROLLMENTS) {
            enrollInstructions.innerHTML = `Confirm profile baseline. <br><strong>Attempt ${enrollmentProfiles.length + 1} of ${REQUIRED_ENROLLMENTS}</strong>`;
        } else {
            // Process profiling averages
            const sumReaction = enrollmentProfiles.reduce((acc, curr) => acc + curr.reactionTime, 0);
            const sumDuration = enrollmentProfiles.reduce((acc, curr) => acc + curr.typingDuration, 0);
            
            averageBiometrics.reactionTime = sumReaction / REQUIRED_ENROLLMENTS;
            averageBiometrics.typingDuration = sumDuration / REQUIRED_ENROLLMENTS;

            // Transition UI views
            enrollSection.classList.add('hidden');
            verifySection.classList.remove('hidden');
            verifyInput.focus();
            focusTime = performance.now(); // establish clean focus state anchor
        }
    });

    // Handle Verification Checks
    attachBiometricTracker(verifyInput, (password, reactionTime, typingDuration) => {
        if (!password) return;
        verifyStatus.className = "status-msg"; // reset message classes

        // Criterion 1: String Validation
        if (password !== enrolledPassword) {
            verifyStatus.textContent = "Rejected: Incorrect password text string.";
            verifyStatus.classList.add("error");
            return;
        }

        // Criterion 2 & 3: Biometric Variance (Reaction Speed & Flight Typing Cadence Duration)
        const reactionVariance = Math.abs(reactionTime - averageBiometrics.reactionTime) / averageBiometrics.reactionTime;
        const durationVariance = Math.abs(typingDuration - averageBiometrics.typingDuration) / averageBiometrics.typingDuration;

        // Logging biometric variance values to developer console for tracking accuracy
        console.log(`Metrics Deviation -> Reaction: ${(reactionVariance * 100).toFixed(1)}%, Typing Rate: ${(durationVariance * 100).toFixed(1)}%`);

        if (reactionVariance <= BIOMETRIC_THRESHOLD && durationVariance <= BIOMETRIC_THRESHOLD) {
            verifyStatus.textContent = "Accepted! Identity and Biometrics match.";
            verifyStatus.classList.add("success");
        } else {
            verifyStatus.textContent = "Rejected: Biometric profile signature mismatch. Try again.";
            verifyStatus.classList.add("error");
        }
    });

    // Global Reset Feature
    function resetProgram() {
        enrolledPassword = "";
        enrollmentProfiles = [];
        averageBiometrics = { reactionTime: 0, typingDuration: 0 };
        isTyping = false;

        enrollInput.value = "";
        verifyInput.value = "";
        enrollStatus.textContent = "";
        verifyStatus.textContent = "";
        verifyStatus.className = "status-msg";
        enrollInstructions.innerHTML = "Create your password. You will need to type it 3 times to train the biometric system.";

        verifySection.classList.add('hidden');
        enrollSection.classList.remove('hidden');
        enrollInput.focus();
        focusTime = performance.now();
    }

    // Auto-initialize focus parameters upon launch
    window.onload = () => {
        enrollInput.focus();
        focusTime = performance.now();
    };
</script>

</body>
</html>
